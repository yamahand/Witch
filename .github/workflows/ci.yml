name: ci

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - preset: ci-windows-debug
            build_preset: build-ci-windows-debug
            test_preset: test-ci-windows-debug
          - preset: ci-windows-release
            build_preset: build-ci-windows-release
            test_preset: test-ci-windows-release
    steps:
      - uses: actions/checkout@v4
      # The runner preinstalls vcpkg and exposes it via VCPKG_INSTALLATION_ROOT.
      # The ci-* presets reference $env{VCPKG_ROOT}, so bridge it here.
      - name: Set VCPKG_ROOT
        shell: pwsh
        run: echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV
      - name: Configure
        run: cmake --preset ${{ matrix.preset }}
      - name: Build
        run: cmake --build --preset ${{ matrix.build_preset }}
      - name: Test
        run: ctest --preset ${{ matrix.test_preset }}
